apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-mongo-srv
spec:
  replicas: 1
  selector:    # find pods how it acutually created
    matchLabels:
      app: orders-mongo

  template:
    metadata:
      labels:  # label that get apply to the pod
        app: orders-mongo
    spec:
      containers:
        - name: orders-mongo
          image: mongo   # fetch from docker hub
---

apiVersion: v1
kind: Service
metadata:
  name: mongo-orders-srv
spec:
  selector:
    app: orders-mongo
  ports:
    - name: db
      protocol: TCP
      port: 27017
      targetPort: 27017